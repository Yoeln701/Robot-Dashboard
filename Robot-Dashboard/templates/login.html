<!DOCTYPE html>
<html>
<body>
    <div style="text-align:center;">
      <h2>Login</h2>
      
      <form method="POST">
          <input type="text" name="username" placeholder="Username" required
            style="padding:10px; width:220px; border-radius:8px; border:2px solid #5b86e5; background:#f9f9ff; color:#333;"><br><br>

          <input type="password" name="password" placeholder="Password" required
            style="padding:10px; width:220px; border-radius:8px; border:2px solid #5b86e5; background:#f9f9ff; color:#333;"><br><br>

          <button type="submit"
            style="background:linear-gradient(45deg,#36d1dc,#5b86e5); color:white; padding:10px 20px; border:none; border-radius:20px; cursor:pointer;">
            Login
          </button>
      </form>
      
      <p><a href="/register">Create account</a></p>

      {% with messages = get_flashed_messages() %}
        {% if messages %}
          {% for message in messages %}
            <p style="color:red;">{{ message }}</p>
          {% endfor %}
        {% endif %}
      {% endwith %}
  </div>
</body>
</html>
